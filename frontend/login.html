<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ConnecT</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fafafa;
    }
    
    .auth-card {
      background: #121212;
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 24px;
      box-shadow: 0 0 24px rgba(249, 115, 22, 0.4);
    }

    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .form-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: var(--text-muted);
    }

    .auth-input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 14px 12px 40px;
      color: white;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .auth-input:focus {
      outline: none;
      border-color: rgba(249, 115, 22, 0.5);
      background: #111;
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-auth:hover {
      background: #ea580c;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .divider::before { margin-right: .5em; }
    .divider::after { margin-left: .5em; }

    .btn-google {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: white;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">C</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to continue to ConnecT</p>
    </div>

    <form id="auth-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="form-input-wrapper">
          <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="form-input-wrapper">
          <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
        </div>
      </div>

      <div id="page-global-error" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 12px; display: none;"></div>

      <button type="submit" class="btn-auth">Sign In</button>
    </form>

    <div class="divider">Or continue with</div>

    <button type="button" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
