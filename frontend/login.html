<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — ConnecT</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .auth-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(108,99,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 70% 80%, rgba(0,212,255,0.06) 0%, transparent 60%);
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .auth-subtitle { font-size: 0.875rem; color: var(--text-secondary); }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
      transition: color var(--t-fast);
    }
    .auth-footer a:hover { color: var(--accent); }
    .password-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px;
      transition: color var(--t-fast);
    }
    .password-toggle:hover { color: var(--text-secondary); }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="auth-card fade-in">

    <a href="index.html" class="nav-logo" style="display:block;text-align:center;font-size:1.5rem;margin-bottom:32px;">ConnecT</a>

    <div class="auth-header">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to find your next teammate</p>
    </div>

    <div id="auth-error" class="alert alert-error" style="display:none">
      <span>⚠</span>
      <span id="error-text"></span>
    </div>

    <form class="auth-form" id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@university.edu" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrapper">
          <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword()">Show</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">Log in</button>
    </form>

    <div class="divider" style="margin-top:24px">or</div>

    <button id="google-auth-btn" class="btn btn-ghost btn-lg w-full" style="margin-top:16px" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const pw = document.getElementById('password');
  const btn = document.querySelector('.password-toggle');
  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = 'Hide';
  } else {
    pw.type = 'password';
    btn.textContent = 'Show';
  }
}
</script>

<script src="js/config.js"></script>
<script type="module" src="js/pages/login.js"></script>

</body>
</html>
