<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Teammates — ConnecT</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .browse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .browse-title { font-size: 1.375rem; font-weight: 700; }
    .browse-subtitle { font-size: 0.875rem; color: var(--text-secondary); margin-top: 2px; }

    .filter-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      outline: none;
      cursor: pointer;
      min-width: 180px;
    }
    .filter-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .filter-label {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .results-count {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .match-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (max-width: 1024px) {
      .match-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="dashboard.html" class="nav-logo">ConnecT</a>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a href="browse.html" class="sidebar-link active">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Browse Teammates
      </a>
      <a href="ideas.html" class="sidebar-link">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        My Ideas
      </a>
      <a href="teams.html" class="sidebar-link">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        Teams
      </a>
      <a href="profile.html" class="sidebar-link">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Profile
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-link" style="color:var(--text-muted)">
        <svg class="sidebar-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Log out
      </a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="app-main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="topbar-title">Browse Teammates</span>
      </div>
      <div class="topbar-right">
        <div class="avatar" style="width:32px;height:32px;font-size:0.75rem">R</div>
      </div>
    </header>

    <main class="main-content">

      <div class="browse-header">
        <div>
          <h1 class="browse-title">Browse Teammates</h1>
          <p class="browse-subtitle">Find people whose ideas complement yours</p>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <span class="filter-label">Filter by idea:</span>
        <select class="filter-select" id="idea-filter">
          <option value="all">Loading ideas…</option>
        </select>
        <span class="filter-label" style="margin-left:12px">Sort:</span>
        <select class="filter-select" id="sort-filter" style="min-width:140px">
          <option value="score">Highest score</option>
          <option value="recent">Most recent</option>
        </select>
      </div>

      <div class="results-count">Loading matches…</div>

      <!-- Match grid -->
      <div class="match-grid stagger">
        <div class="empty-state" style="grid-column:1 / -1">
          <div class="empty-icon">⌛</div>
          <div class="empty-title">Loading matches</div>
          <div class="empty-text">Fetching recommendations for your ideas…</div>
        </div>
      </div>

      <div style="margin-top:18px;display:flex;justify-content:center">
        <button id="load-more-btn" class="btn btn-ghost btn-sm" style="display:none">Load more</button>
      </div>
    </main>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module" src="js/pages/browse.js"></script>

</body>
</html>
