<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams — ConnecT</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .teams-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .teams-title { font-size: 1.375rem; font-weight: 700; }
    .teams-subtitle { font-size: 0.875rem; color: var(--text-secondary); margin-top: 2px; }
    .teams-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .team-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color var(--t-normal), background var(--t-normal);
    }
    .team-row:hover {
      border-color: rgba(108,99,255,0.2);
      background: var(--bg-card-hover);
    }
    .team-info { display: flex; align-items: center; gap: 16px; flex: 1; }
    .team-icon-wrap {
      width: 48px; height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .team-name { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
    .team-idea { font-size: 0.8125rem; color: var(--text-secondary); }

    .team-meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .meta-value { font-size: 0.9375rem; font-weight: 700; }
    .meta-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .team-actions { display: flex; gap: 8px; }

    .member-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .member-row:last-child { border-bottom: none; }
    .member-name { font-weight: 600; font-size: 0.9375rem; }
    .member-role { font-size: 0.8125rem; color: var(--text-secondary); }

    .team-detail-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-top: 24px;
    }
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .detail-title { font-size: 1.125rem; font-weight: 700; }

    @media (max-width: 768px) {
      .team-row { flex-direction: column; align-items: flex-start; }
      .team-meta { align-self: flex-start; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <div class="app-main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>

      </div>
      <div class="topbar-right">
        <div class="avatar" style="width:32px;height:32px;font-size:0.75rem">R</div>
      </div>
    </header>

    <main class="main-content">
      <div class="teams-header">
        <div>
          <h1 class="teams-title">My Teams</h1>
          <p class="teams-subtitle">Manage your active collaborations</p>
        </div>
      </div>

      <div class="teams-grid stagger">
        <div class="empty-state">
          <div class="empty-icon">⌛</div>
          <div class="empty-title">Loading teams</div>
          <div class="empty-text">Fetching team activity and pending requests…</div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module" src="js/pages/teams.js"></script>

</body>
</html>
