<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — ConnecT</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .auth-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 40% 20%, rgba(108,99,255,0.14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(0,212,255,0.08) 0%, transparent 60%);
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .auth-subtitle { font-size: 0.875rem; color: var(--text-secondary); }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
      transition: color var(--t-fast);
    }
    .auth-footer a:hover { color: var(--accent); }
    .password-strength {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width var(--t-normal), background var(--t-normal);
    }
    .pw-weak   { width: 33%; background: var(--red); }
    .pw-medium { width: 66%; background: var(--yellow); }
    .pw-strong { width: 100%; background: var(--green); }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="auth-card fade-in">

    <a href="index.html" class="nav-logo" style="display:block;text-align:center;font-size:1.5rem;margin-bottom:32px;">ConnecT</a>

    <div class="auth-header">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start finding teammates in minutes</p>
    </div>

    <div id="auth-error" class="alert alert-error" style="display:none">
      <span>⚠</span>
      <span id="error-text"></span>
    </div>

    <form class="auth-form" id="signup-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="name">Full name</label>
        <input class="form-input" type="text" id="name" placeholder="Your name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@university.edu" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password" oninput="checkStrength(this.value)">
        <div class="password-strength">
          <div class="password-strength-bar" id="pw-bar"></div>
        </div>
        <span class="form-hint" id="pw-hint">Use 8+ characters with a mix of letters and numbers</span>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" id="submit-btn">Create account</button>
    </form>

    <div class="divider" style="margin-top:24px">or</div>

    <button id="google-auth-btn" class="btn btn-ghost btn-lg w-full" style="margin-top:16px" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>

<script>
function checkStrength(pw) {
  const bar = document.getElementById('pw-bar');
  const hint = document.getElementById('pw-hint');
  bar.className = 'password-strength-bar';
  if (pw.length === 0) {
    bar.style.width = '0%';
    hint.textContent = 'Use 8+ characters with a mix of letters and numbers';
    return;
  }
  if (pw.length < 8) {
    bar.classList.add('pw-weak');
    hint.textContent = 'Too short';
    return;
  }
  const hasNum = /\d/.test(pw);
  const hasMix = /[a-z]/.test(pw) && /[A-Z]/.test(pw);
  if (hasNum && hasMix) {
    bar.classList.add('pw-strong');
    hint.textContent = 'Strong password';
  } else if (hasNum || hasMix) {
    bar.classList.add('pw-medium');
    hint.textContent = 'Could be stronger — add numbers or mixed case';
  } else {
    bar.classList.add('pw-weak');
    hint.textContent = 'Weak — add numbers and mixed case';
  }
}
</script>

<script src="js/config.js"></script>
<script type="module" src="js/pages/signup.js"></script>

</body>
</html>
